<style>

  .stop-card.skipped { opacity: 0.5; }
  .stop-card.skipped .stop-header-main { text-decoration: line-through; }

    border-bottom: 1px solid var(--line);

    min-width: 0;

  .stop-header-top {

    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 4px;

  .stop-time {

    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
    font-weight: 500;

  .stop-op {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 2px;
    color: white;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
    flex-shrink: 0;

  .stop-op.metropolis { background: var(--op-metropolis); }

    font-size: 17px;
    font-weight: 500;
    line-height: 1.25;

    font-size: 11px;
    color: var(--ink-soft);

  .stop-body { padding: 14px; }
  .edge-case {
    background: var(--highlight);

    margin-bottom: 14px;
    font-size: 13px;
  }
  .edge-case-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 3px;
  }
  .stop-facts {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;

    border: 1px solid var(--line);

    border-radius: 2px;

    color: var(--ink-soft);

  .notes-section { margin-bottom: 14px; }
  .section-label {

    text-transform: uppercase;

    justify-content: space-between;
    align-items: baseline;

  .save-indicator {

    flex-wrap: wrap;

    margin-bottom: 10px;

  .chip {

    gap: 6px;
  }
  .btn-action {

    font-size: 11px;
    padding: 14px 8px;
    border: 1px solid var(--line);
    background: white;
    color: var(--ink);
    border-radius: 2px;

    text-transform: uppercase;
    font-weight: 500;
    min-height: 52px;
    text-decoration: none;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
  }

    font-style: italic;

    border-bottom: 1px solid var(--line);

    justify-content: space-between;
    align-items: baseline;

    font-size: 10px;
    font-style: normal;
    letter-spacing: 0.1em;
    color: var(--ink-quiet);
    text-transform: uppercase;
  }

    border-radius: 3px;

  }
  .map-legend {
    font-family: 'IBM Plex Mono', monospace;

    color: var(--ink-soft);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 10px 12px;
    background: var(--bg-elev);
    border: 1px solid var(--line);

    margin-bottom: 12px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;

  }

  .legend-dot.active { background: var(--status-active); }
  .legend-dot.pending { background: var(--ink); }

  .stop-marker {
    background: var(--ink);
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 50%;

    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Serif', serif;
    font-weight: 600;
    font-size: 14px;
    border: 3px solid white;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
  }
  .stop-marker.done { background: var(--status-complete); }
  .stop-marker.active { background: var(--status-active); }
  .stop-marker.skipped { background: #d8d8d8; color: var(--ink-quiet); }
  .stop-marker.bench {
    background: white;
    color: var(--ink);
    border: 2px dashed var(--ink-soft);
    font-size: 10px;
    width: 28px;
    height: 28px;
  }
  .base-marker {
    background: var(--accent);
    color: white;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    border: 3px solid white;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);

  .leaflet-popup-content-wrapper { border-radius: 2px; }

    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    line-height: 1.4;
  }
  .popup-head {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    margin-bottom: 4px;
    text-transform: uppercase;

  .popup-title {

    font-weight: 500;

    font-size: 11px;
    padding: 12px 20px;

    gap: 12px;
    align-items: center;
    justify-content: space-between;
    z-index: 20;

    font-size: 11px;

    letter-spacing: 0.16em;

  .dock-btn {
    background: var(--bg);
    color: var(--ink);

    padding: 10px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-radius: 2px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(26,26,26,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-bg.visible { display: flex; }
  .modal {
    background: var(--bg-elev);
    border-radius: 4px;
    padding: 24px;
    max-width: 420px;
    width: 100%;
  }
  .modal h3 {
    font-family: 'IBM Plex Serif', serif;
    font-size: 17px;
    margin-bottom: 8px;
  }
  .modal p { font-size: 14px; margin-bottom: 16px; color: var(--ink-soft); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="header-title">Colonial · Field Tracker</div>
    <div class="header-meta" id="date-stamp">Wed · Apr 22</div>
  </div>
  <div class="progress-bar" id="progress-bar"></div>
  <div class="stats-line" id="stats-line">

  </div>
</header>
<main>
  <div class="tab-row">
    <button class="tab active" data-tab="route">Route</button>
    <button class="tab" data-tab="map">Map</button>
    <button class="tab" data-tab="export">Export · Notes</button>
  </div>
  <div id="tab-route"></div>
  <div id="tab-map" style="display:none">
    <div class="map-legend">
      <span class="legend-item"><span class="legend-dot active"></span>Active</span>
      <span class="legend-item"><span class="legend-dot pending"></span>Pending</span>

    <div id="map"></div>
  </div>
  <div id="tab-export" style="display:none">
    <div class="export-view" id="export-panel"></div>
  </div>
</main>
<div class="bottom-dock" id="bottom-dock">
  <div class="dock-info">
    <div class="dock-label">Next up</div>
    <div class="dock-stop" id="dock-stop">All done</div>
  </div>
  <button class="dock-btn" id="dock-jump">Jump</button>
</div>
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modal-title">Reset all progress?</h3>
    <p id="modal-body">This clears all checkmarks and notes. Cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn-export secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-export danger" id="modal-confirm">Reset</button>
    </div>
  </div>
</div>

const QUICK_CHIPS = [
  'Gated', 'Gateless', 'No attendant', 'Attendant present',
  'SP+ branding visible', 'Metro-branded', 'VP kiosk',
  'Below grade', 'Surface lot', 'Cell signal weak',
  'Rate matches sign', 'Rate differs from sign', 'Service fee hidden',
  'SMS received', 'No SMS yet', 'ALPR signage posted', 'No ALPR signage'
];

const BASE_COORD = [38.9225, -77.0762];
const STORAGE_KEY = 'colonial_field_tracker_v1';
let state = { progress: {}, notes: {}, startedAt: null, lastSaved: null };
let mapInstance = null;
let mapMarkers = [];

async function loadState() {
  try {
    const result = await window.storage.get(STORAGE_KEY);
    if (result && result.value) {
      const parsed = JSON.parse(result.value);
      state = Object.assign({ progress: {}, notes: {} }, parsed);
      state.progress = state.progress || {};
      state.notes = state.notes || {};
    }
  } catch (e) {
    console.log('First session');
  }
}

let saveTimeout = null;
function saveState(showIndicator) {
  if (showIndicator === undefined) showIndicator = true;
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    try {
      state.lastSaved = new Date().toISOString();
      await window.storage.set(STORAGE_KEY, JSON.stringify(state));
      if (showIndicator) flashSaved();
    } catch (e) { console.error('Save failed:', e); }
  }, 300);
}

function flashSaved() {
  document.querySelectorAll('.save-indicator').forEach(el => {
    el.classList.add('visible');
    setTimeout(() => el.classList.remove('visible'), 900);
  });
}

function getStatus(id) { return state.progress[id] || null; }
function isActive(id) {
  const mainStops = STOPS.filter(s => s.group === 'main');
  const active = mainStops.find(s => !state.progress[s.id]);
  return active && active.id === id;
}

function render() {
  renderRoute();
  renderProgressBar();
  renderDock();
  if (mapInstance) renderMapMarkers();
}

function renderProgressBar() {
  const bar = document.getElementById('progress-bar');
  const mainStops = STOPS.filter(s => s.group === 'main');
  bar.innerHTML = mainStops.map(s => {
    const st = getStatus(s.id);
    const cls = st === 'done' ? 'done' : (isActive(s.id) ? 'active' : '');
    return '<div class="progress-cell ' + cls + '"></div>';
  }).join('');
  const done = mainStops.filter(s => state.progress[s.id] === 'done').length;
  const skipped = mainStops.filter(s => state.progress[s.id] === 'skipped').length;
  const left = mainStops.length - done - skipped;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-left').textContent = left;
  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  document.getElementById('stat-time').innerHTML = '<b>' + timeStr + '</b>' + (skipped ? ' · ' + skipped + ' skipped' : '');
}

function renderRoute() {
  const container = document.getElementById('tab-route');
  const mainStops = STOPS.filter(s => s.group === 'main');
  const benchStops = STOPS.filter(s => s.group === 'bench');
  container.innerHTML = mainStops.map(renderStopCard).join('') +
    '<div class="section-header"><span>Outing 5B — Bench</span>' +
    '<span class="section-header-meta">' + benchStops.length + ' add-ons</span></div>' +
    benchStops.map(renderStopCard).join('');
  document.querySelectorAll('textarea[data-stop]').forEach(ta => {
    const id = ta.dataset.stop;
    ta.value = state.notes[id] || '';
    ta.addEventListener('input', () => {
      state.notes[id] = ta.value;
      saveState();
    });
  });
}

function renderStopCard(s) {
  const status = getStatus(s.id);
  const active = isActive(s.id);
  const collapsed = status === 'done' || status === 'skipped';
  const cardCls = ['stop-card'];
  if (active) cardCls.push('active-stop');
  if (status === 'done') cardCls.push('done');
  if (status === 'skipped') cardCls.push('skipped');
  if (collapsed) cardCls.push('collapsed');
  const numCls = ['stop-number'];
  if (active) numCls.push('active');
  if (status === 'done') numCls.push('done');
  if (status === 'skipped') numCls.push('skipped');
  const numDisplay = status === 'done' ? '✓' : (status === 'skipped' ? '—' : s.num);
  const title = s.building || s.address;
  const subtitle = s.building ? s.address : '';
  const fullAddr = encodeURIComponent(s.address + ', ' + s.city);
  const mapUrl = 'https://maps.apple.com/?q=' + fullAddr;
  const actionsHtml = collapsed ?
    '<div class="action-row">' +
      '<button class="btn-action" onclick="setStatus(\'' + s.id + '\', null)">Undo</button>' +
      '<button class="btn-action" onclick="toggleCollapse(\'' + s.id + '\')">Expand</button>' +
      '<a class="btn-action nav" href="' + mapUrl + '" target="_blank">Nav</a></div>' :
    '<div class="action-row">' +
      '<button class="btn-action primary" onclick="setStatus(\'' + s.id + '\', \'done\')">✓ Done</button>' +
      '<button class="btn-action" onclick="setStatus(\'' + s.id + '\', \'skipped\')">Skip</button>' +
      '<a class="btn-action nav" href="' + mapUrl + '" target="_blank">Nav</a></div>';
  const chipsHtml = !collapsed ?
    '<div class="quick-chips">' +
    QUICK_CHIPS.map(c => '<span class="chip" onclick="appendChip(\'' + s.id + '\', \'' + c + '\')">' + c + '</span>').join('') +
    '</div>' : '';
  return '<div class="' + cardCls.join(' ') + '" id="card-' + s.id + '">' +
    '<div class="stop-header" onclick="toggleCollapse(\'' + s.id + '\')">' +
      '<div class="' + numCls.join(' ') + '">' + numDisplay + '</div>' +
      '<div class="stop-header-content">' +
        '<div class="stop-header-top">' +
          '<div class="stop-time">' + s.time + '</div>' +
          '<div class="stop-op ' + s.opClass + '">' + s.op + '</div>' +
        '</div>' +
        '<div class="stop-header-main">' + title + '</div>' +
        (subtitle ? '<div class="stop-addr">' + subtitle + ' · ' + s.city + '</div>' : '<div class="stop-addr">' + s.city + '</div>') +
      '</div>' +
    '</div>' +
    '<div class="stop-body">' +
      '<div class="edge-case">' +
        '<div class="edge-case-label">Edge case</div>' +
        '<div><b>' + s.edgeCase + '</b> — ' + s.edgeCaseBody + '</div>' +
      '</div>' +
      '<div class="stop-facts">' + s.facts + '</div>' +
      (s.routeNote ? '<div class="route-note">' + s.routeNote + '</div>' : '') +
      '<div class="notes-section">' +
        '<div class="section-label">Your notes<span class="save-indicator">saved</span></div>' +
        chipsHtml +
        '<textarea data-stop="' + s.id + '" placeholder="Observations, rate captured, anomalies, photo refs..."></textarea>' +
      '</div>' +
      actionsHtml +
    '</div>' +
  '</div>';
}

function renderDock() {
  const mainStops = STOPS.filter(s => s.group === 'main');
  const next = mainStops.find(s => !state.progress[s.id]);
  const dockStop = document.getElementById('dock-stop');
  const btn = document.getElementById('dock-jump');
  if (next) {
    const loc = next.building || next.address.split(',')[0];
    dockStop.textContent = next.num + '. ' + loc;
    btn.textContent = 'Jump';
    btn.onclick = () => {
      const card = document.getElementById('card-' + next.id);
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
  } else {
    dockStop.textContent = 'Route complete';
    btn.textContent = 'Export';
    btn.onclick = () => switchTab('export');
  }
}

function renderExport() {
  const panel = document.getElementById('export-panel');
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  const rows = STOPS.map(s => {
    const status = getStatus(s.id);
    const statusLabel = status === 'done' ? '✓ DONE' : (status === 'skipped' ? '— SKIPPED' : '· pending');
    const notes = state.notes[s.id] || '';
    return '<div class="export-stop">' +
      '<div class="export-stop-head"><span>' + s.num + ' · ' + s.time + ' · ' + s.op + '</span><span>' + statusLabel + '</span></div>' +
      '<div class="export-stop-title">' + (s.building || s.address) + '</div>' +
      '<div class="export-stop-chips">' + s.address + ' · ' + s.city + ' · Edge case: ' + s.edgeCase + '</div>' +
      '<div class="export-stop-notes ' + (!notes ? 'empty' : '') + '">' + (notes || '(no notes)') + '</div>' +
    '</div>';
  }).join('');
  panel.innerHTML =
    '<h2>Field Notes — Wed Apr 22 Loop</h2>' +
    '<div class="export-meta">Captured ' + dateStr + '</div>' +
    rows +
    '<div class="export-actions">' +
      '<button class="btn-export" onclick="copyAll()">Copy all</button>' +
      '<button class="btn-export secondary" onclick="downloadText()">Download .txt</button>' +
      '<button class="btn-export secondary" onclick="emailSelf()">Email to myself</button>' +
      '<button class="btn-export danger" onclick="confirmReset()">Reset all</button>' +
    '</div>';
}

function initMap() {
  if (mapInstance) return;
  mapInstance = L.map('map', { zoomControl: true, tap: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(mapInstance);
  const allCoords = [BASE_COORD].concat(STOPS.map(s => [s.lat, s.lng]));
  mapInstance.fitBounds(L.latLngBounds(allCoords), { padding: [40, 40] });
  L.marker(BASE_COORD, {
    icon: L.divIcon({
      className: '',
      html: '<div class="base-marker">⌂</div>',
      iconSize: [24, 24],
      iconAnchor: [12, 12]
    })
  }).addTo(mapInstance).bindPopup('<div class="popup-head">Base</div><div class="popup-title">Glover Park</div>');
  const mainStops = STOPS.filter(s => s.group === 'main');
  const routeCoords = [BASE_COORD].concat(mainStops.map(s => [s.lat, s.lng])).concat([BASE_COORD]);
  L.polyline(routeCoords, {
    color: '#1A1A1A',
    weight: 2,
    opacity: 0.5,
    dashArray: '6, 6',
    interactive: false
  }).addTo(mapInstance);
  renderMapMarkers();
}

function renderMapMarkers() {
  if (!mapInstance) return;
  mapMarkers.forEach(m => m.remove());
  mapMarkers = [];
  STOPS.forEach(s => {
    const status = getStatus(s.id);
    const active = isActive(s.id);
    const isBench = s.group === 'bench';
    const cls = ['stop-marker'];
    if (isBench) cls.push('bench');
    if (status === 'done') cls.push('done');
    else if (status === 'skipped') cls.push('skipped');
    else if (active) cls.push('active');
    const display = status === 'done' ? '✓' : (status === 'skipped' ? '—' : s.num);
    const marker = L.marker([s.lat, s.lng], {
      icon: L.divIcon({
        className: '',
        html: '<div class="' + cls.join(' ') + '">' + display + '</div>',
        iconSize: isBench ? [28, 28] : [32, 32],
        iconAnchor: isBench ? [14, 14] : [16, 16]
      }),
      zIndexOffset: active ? 1000 : (status === 'done' ? 100 : 500)
    }).addTo(mapInstance);
    const statusLabel = status === 'done' ? '✓ Done' : (status === 'skipped' ? '— Skipped' : (active ? '● Active' : '· Pending'));
    const title = s.building || s.address;
    marker.bindPopup(
      '<div class="popup-head">' + s.num + ' · ' + s.time + ' · ' + s.op + ' · ' + statusLabel + '</div>' +
      '<div class="popup-title">' + title + '</div>' +
      '<div style="font-family: IBM Plex Mono, monospace; font-size: 10px; color: #4A4A4A; margin-bottom: 6px;">' + s.address + '</div>' +
      '<div style="font-size:12px;"><b>Edge case:</b> ' + s.edgeCase + '</div>'
    );
    mapMarkers.push(marker);
  });
}

function setStatus(id, status) {
  if (status) state.progress[id] = status;
  else delete state.progress[id];
  if (!state.startedAt) state.startedAt = new Date().toISOString();
  saveState();
  render();
  if (status === 'done' || status === 'skipped') {
    setTimeout(() => {
      const mainStops = STOPS.filter(s => s.group === 'main');
      const next = mainStops.find(s => !state.progress[s.id]);
      if (next) {
        const card = document.getElementById('card-' + next.id);
        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }, 250);
  }
}

function toggleCollapse(id) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  const status = getStatus(id);
  if (status === 'done' || status === 'skipped') {
    card.classList.toggle('collapsed');
  }
}

function appendChip(id, text) {
  const ta = document.querySelector('textarea[data-stop="' + id + '"]');
  if (!ta) return;
  const sep = ta.value && !ta.value.endsWith(' ') && !ta.value.endsWith('\n') ? ' ' : '';
  ta.value += sep + text + '.';
  state.notes[id] = ta.value;
  ta.focus();
  saveState();
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.getElementById('tab-route').style.display = name === 'route' ? '' : 'none';
  document.getElementById('tab-map').style.display = name === 'map' ? '' : 'none';
  document.getElementById('tab-export').style.display = name === 'export' ? '' : 'none';
  if (name === 'export') renderExport();
  if (name === 'map') {
    initMap();
    setTimeout(() => {
      if (mapInstance) mapInstance.invalidateSize();
      renderMapMarkers();
    }, 50);
  }
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => switchTab(t.dataset.tab));
});

function buildExportText() {
  const now = new Date();
  const lines = ['Colonial · Field Notes · ' + now.toLocaleString(), '=================================================', ''];
  STOPS.forEach(s => {
    const status = getStatus(s.id);
    const statusLabel = status === 'done' ? '[✓ DONE]' : (status === 'skipped' ? '[— SKIPPED]' : '[· pending]');
    lines.push(s.num + ' · ' + s.time + ' · ' + s.op + ' ' + statusLabel);
    lines.push('  ' + (s.building || s.address));
    lines.push('  ' + s.address + ', ' + s.city);
    lines.push('  Edge case: ' + s.edgeCase);
    const notes = state.notes[s.id];
    if (notes) {
      lines.push('');
      notes.split('\n').forEach(l => lines.push('  ' + l));
    }
    lines.push('');
    lines.push('-------------------------------------------------');
    lines.push('');
  });
  return lines.join('\n');
}

async function copyAll() {
  const text = buildExportText();
  try {
    await navigator.clipboard.writeText(text);
    alert('Copied to clipboard.');
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('Copied.');
  }
}

function downloadText() {
  const text = buildExportText();
  const stamp = new Date().toISOString().split('T')[0].replace(/-/g, '');
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'colonial_field_notes_' + stamp + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function emailSelf() {
  const text = buildExportText();
  const subj = 'Colonial field notes — ' + new Date().toLocaleDateString();
  window.location.href = 'mailto:?subject=' + encodeURIComponent(subj) + '&body=' + encodeURIComponent(text);
}

function confirmReset() {
  document.getElementById('modal-title').textContent = 'Reset all progress?';
  document.getElementById('modal-body').textContent = 'This clears all checkmarks and notes. Cannot be undone.';
  document.getElementById('modal-confirm').onclick = () => {
    state = { progress: {}, notes: {}, startedAt: null, lastSaved: null };
    saveState(false);
    render();
    closeModal();
  };
  document.getElementById('modal').classList.add('visible');
}

function closeModal() {
  document.getElementById('modal').classList.remove('visible');
}

async function init() {
  await loadState();
  render();
  setInterval(renderProgressBar, 60000);
}
init();
</script>
</body>
</html>
